<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 { font-size: 2rem; letter-spacing: 0.1em; color: #e0e0ff; }

    #status {
      font-size: 1.2rem;
      height: 1.6em;
      color: #a0a0ff;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.04); }
    .cell.taken { cursor: default; }

    .cell.x { color: #ff6b9d; }
    .cell.o { color: #4ecdc4; }
    .cell.win { background: #0f3460; animation: pulse 0.5s ease; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    #reset {
      padding: 12px 32px;
      font-size: 1rem;
      background: #533483;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    #reset:hover { background: #6a45a0; }

    #score {
      display: flex;
      gap: 40px;
      font-size: 1rem;
      color: #888;
    }

    .score-item span { font-weight: 700; font-size: 1.4rem; }
    .score-item .x-score { color: #ff6b9d; }
    .score-item .o-score { color: #4ecdc4; }
    .score-item .d-score { color: #aaa; }

    #theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: none;
      border: 2px solid #555;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #eee;
      transition: border-color 0.15s, color 0.15s;
    }
    #theme-toggle:hover { border-color: #a0a0ff; color: #a0a0ff; }

    body.light {
      background: #f0f0f8;
      color: #111;
    }
    body.light h1 { color: #2a2a6e; }
    body.light #status { color: #5050cc; }
    body.light .cell { background: #dde; color: #111; }
    body.light .cell:hover:not(.taken) { background: #b0b0dd; }
    body.light .cell.win { background: #b0b0dd; }
    body.light #reset { background: #533483; }
    body.light #reset:hover { background: #6a45a0; }
    body.light #score { color: #555; }
    body.light #theme-toggle { border-color: #999; color: #333; }
    body.light #theme-toggle:hover { border-color: #5050cc; color: #5050cc; }
  </style>
</head>
<body>
  <button id="theme-toggle">☀ Light</button>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-item">X <span class="x-score" id="xScore">0</span></div>
    <div class="score-item">Draws <span class="d-score" id="dScore">0</span></div>
    <div class="score-item">O <span class="o-score" id="oScore">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scores = { X: 0, O: 0, D: 0 };

    let board, current, over;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a, b, c];
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const win = checkWin();
        if (win) {
          over = true;
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `${current} wins!`;
          scores[current]++;
          updateScore();
        } else if (board.every(Boolean)) {
          over = true;
          status.textContent = "It's a draw!";
          scores.D++;
          updateScore();
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    function updateScore() {
      document.getElementById('xScore').textContent = scores.X;
      document.getElementById('oScore').textContent = scores.O;
      document.getElementById('dScore').textContent = scores.D;
    }

    document.getElementById('reset').addEventListener('click', init);

    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      themeBtn.textContent = isLight ? '🌙 Dark' : '☀ Light';
    });

    init();
  </script>
</body>
</html>
